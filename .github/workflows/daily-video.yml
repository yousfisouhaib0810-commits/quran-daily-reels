name: Daily Quran Reel Generator

on:
  # جدولة يومية - 6 صباحاً بتوقيت الجزائر (5:00 UTC)
  schedule:
    - cron: '0 5 * * *'
  
  # تشغيل يدوي للاختبار
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest
    
    steps:
      # 1. تحميل الكود
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. إعداد Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 3. تثبيت FFmpeg والخطوط العربية
      - name: Install FFmpeg and Arabic fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-core fonts-noto-extra fonts-arabeyes fonts-hosny-amiri
      
      # 4. تثبيت المكتبات
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 5. إعداد Google Drive credentials
      - name: Setup Google credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          mkdir -p config
          echo "$GOOGLE_CREDENTIALS" > config/credentials.json
      
      # 6. استعادة الحالة السابقة
      - name: Restore state
        uses: actions/cache@v4
        with:
          path: |
            state/
            data/audio/
          key: quran-bot-state-${{ github.run_number }}
          restore-keys: |
            quran-bot-state-
      
      # 7. إعداد YouTube credentials
      - name: Setup YouTube credentials
        if: ${{ secrets.YOUTUBE_CLIENT_SECRETS != '' }}
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        run: |
          echo "$YOUTUBE_CLIENT_SECRETS" > config/youtube_credentials.json
      
      # 8. تشغيل البوت
      - name: Generate video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          YOUTUBE_ENABLED: "true"
        run: |
          python main.py
      
      # 9. حفظ الحالة
      - name: Save state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            state/
            data/audio/
          key: quran-bot-state-${{ github.run_number }}
      
      # 10. رفع الفيديو كـ artifact (احتياطي)
      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-quran-reel
          path: output/*.mp4
          retention-days: 7
      
      # 11. Commit state changes
      - name: Commit state changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state/state.json || true
          git diff --staged --quiet || git commit -m "Update state after video generation"
          git push || true